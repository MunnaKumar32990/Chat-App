services:
  # Backend API service
  - type: web
    name: chat-app-backend
    env: node
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: PORT
        value: 5002
    autoDeploy: true

  # Frontend service (static site)
  - type: web
    name: chat-app-frontend
    env: static
    region: ohio
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://chat-app-backend.onrender.com
    autoDeploy: true
